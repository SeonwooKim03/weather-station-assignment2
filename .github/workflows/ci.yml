name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show Node version
        run: node -v

      - name: Run sampler syntax check
        run: node --check sampler.js

      - name: Run sensor syntax check
        run: node --check sensor.js

      - name: Run test file syntax check
        run: node --check test/sampler.test.js
